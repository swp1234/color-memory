                        </div>
                    </div>

    <style>

    </style>
    <script>
        document.getElementById('shareTwitterBtn')?.addEventListener('click',function(){var t=document.title+' '+window.location.href;window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(t),'_blank');if(typeof gtag!=='undefined')gtag('event','share',{method:'twitter'})});
        document.getElementById('shareUrlBtn')?.addEventListener('click',function(){var b=this;navigator.clipboard.writeText(window.location.href).then(function(){b.textContent=(window.i18n?.t('share.copied')||'✅ Copied!');setTimeout(function(){b.innerHTML=(window.i18n?.t('share.copyUrl')||'📋 Copy URL')},2000)});if(typeof gtag!=='undefined')gtag('event','share',{method:'url_copy'})});
